services:
  - type: web
    name: blue-ox-logging-app
    env: node
    buildCommand: npm run build:render
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: blue-ox-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: blue-ox-db
    databaseName: blue_ox_logging
    user: blue_ox_user
    plan: free
