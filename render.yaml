services:
  - type: web
    name: blue-ox-logging-app
    env: node
    buildCommand: npm run build:render
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: blue-ox-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: OFFICE_LAT
        value: -0.5935307533555609
      - key: OFFICE_LNG
        value: 30.611884814347622

databases:
  - name: blue-ox-db
    databaseName: blue_ox_logging
    user: blue_ox_user
    plan: free
